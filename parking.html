<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="./css.css" />
    <title>Información de Estacionamiento</title>
    <link rel="icon" type="image/x-icon" href="./images/favi.png">
    <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js"></script>
    <style>
        #map {
            width: 100%;
            height: 600px;
        }
        </style>
    </head>
  <body>
    <div class="container">
        <div class="title">Información de Estacionamiento</div>
        <div style="margin-top: 30px">
            <span>El campus de la Universidad de Washington es muy grande y encontrar  estancamiento es difícil. Yo recomiendo 3 opciones.</span>
            <h1>Opccion</h1>
            <div id="map"></div>
            <script>
                mapkit.init({
                    authorizationCallback: function(done) {
                        var xhr = new XMLHttpRequest();
                        xhr.open("GET", "/services/jwt");
                        xhr.addEventListener("load", function() {
                            done(this.responseText);
                        });
                        xhr.send();
                    }
                });
                
                var UW = new mapkit.CoordinateRegion(
                    new mapkit.Coordinate(47.656849, -122.311627),
                    new mapkit.CoordinateSpan(0.167647972, 0.354985255)
                );
                var map = new mapkit.Map("map");
                map.region = UW;
                </script>
        </div>
  </body>
  </html>
